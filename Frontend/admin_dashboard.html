<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    display: flex;
    height: 100vh;
    background: #eef2ff;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #1f2937;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
}

.nav a {
    display: block;
    padding: 12px;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 10px;
    cursor: pointer;
}

.nav a:hover { background: #374151; }
.nav a.active { background: #2563eb; }

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}

.section { display: none; }
.section.active { display: block; }

.card {
    background: white;
    padding: 20px;
    margin: 10px;
    display: inline-block;
    width: 220px;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

button {
    background: #2563eb;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 10px;
}

.action-btn {
    padding: 6px 10px;
    margin-right: 5px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
}

.edit { background: #f59e0b; }
.delete { background: #ef4444; }

</style>
</head>

<body>

<div class="sidebar">
    <div>
        <h2>ADMIN</h2>

        <div class="nav">
            <a class="menu active" data-page="dashboard">Dashboard</a>
            <a class="menu" data-page="users">Users</a>
            <a class="menu" data-page="books">Books</a>
            <a class="menu" data-page="transactions">Transactions</a>
        </div>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">
        <h2>Dashboard</h2>
        <div class="card">👥 Users</div>
        <div class="card">📚 Books</div>
        <div class="card">🔄 Transactions</div>
    </div>

    <!-- USERS -->
    <div id="users" class="section">
        <h2>User Management</h2>
        <button onclick="addUser()">+ Add User</button>
        <table id="usersTable"></table>
    </div>

    <!-- BOOKS -->
    <div id="books" class="section">
        <h2>Books Module</h2>
        <button onclick="addBook()">+ Add Book</button>
        <table id="booksTable"></table>
    </div>

    <!-- TRANSACTIONS -->
    <div id="transactions" class="section">
        <h2>Borrowing Transactions</h2>
        <button onclick="addTransaction()">+ Borrow Book</button>
        <table id="transTable"></table>
    </div>

</div>

<script>

const API = "http://127.0.0.1:8000/api";
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

/* AUTH CHECK */
if (!user || user.role !== "admin") {
    window.location.href = "index.html";
}

/* ================= NAV ================= */
document.querySelectorAll(".menu").forEach(menu => {
    menu.addEventListener("click", () => {

        document.querySelectorAll(".menu").forEach(m => m.classList.remove("active"));
        menu.classList.add("active");

        const page = menu.dataset.page;

        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
        document.getElementById(page).classList.add("active");

        if (page === "users") loadUsers();
        if (page === "books") loadBooks();
        if (page === "transactions") loadTransactions();
    });
});

/* ================= USERS ================= */
async function loadUsers() {
    const res = await fetch(`${API}/users`, {
        headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/json"
        }
    });

    const data = await res.json();

    let html = `
    <tr>
        <th>ID</th>
        <th>Image</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Action</th>
    </tr>`;

    data.forEach(u => {
        html += `
        <tr>
            <td>${u.id}</td>
            <td>
                <img src="${u.image ? u.image : 'default.png'}" width="50" height="50" style="border-radius:50%">
            </td>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td>${u.role}</td>
            <td>
                <button class="action-btn edit" onclick="editUser(${u.id})">Edit</button>
                <button class="action-btn delete" onclick="deleteItem('users',${u.id})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("usersTable").innerHTML = html;
}
/* ADD USER */
async function addUser() {
    const { value: form } = await Swal.fire({
        title: "Add User",
        html: `
        <input id="name" class="swal2-input" placeholder="Name">
        <input id="email" class="swal2-input" placeholder="Email">
        <input id="password" class="swal2-input" placeholder="Password">

        <select id="role" class="swal2-input">
            <option value="admin">Admin</option>
            <option value="librarian">Librarian</option>
            <option value="borrower">Borrower</option>
        </select>

        <input type="file" id="image" class="swal2-input">
        `,
        preConfirm: () => {
            return {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                role: document.getElementById("role").value,
                image: document.getElementById("image").files[0]
            };
        }
    });

    if (!form) return;

    let fd = new FormData();
    fd.append("name", form.name);
    fd.append("email", form.email);
    fd.append("password", form.password);
    fd.append("role", form.role);
    if (form.image) fd.append("image", form.image);

    await fetch(`${API}/users`, {
        method: "POST",
        headers: {
            "Authorization": `Bearer ${token}`
        },
        body: fd
    });

    loadUsers();
}

/* ================= FIXED EDIT USER ================= */
window.editUser = async function(id) {

    const res = await fetch(`${API}/users/${id}`, {
        headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/json"
        }
    });

    const u = await res.json();

    const { value: form } = await Swal.fire({
        title: "Edit User",
        html: `
        <input id="name" class="swal2-input" value="${u.name}">
        <input id="email" class="swal2-input" value="${u.email}">
        <input id="password" class="swal2-input" placeholder="New Password (optional)">

        <select id="role" class="swal2-input">
            <option value="admin" ${u.role === "admin" ? "selected" : ""}>Admin</option>
            <option value="librarian" ${u.role === "librarian" ? "selected" : ""}>Librarian</option>
            <option value="borrower" ${u.role === "borrower" ? "selected" : ""}>Borrower</option>
        </select>

        <input type="file" id="image" class="swal2-input">
        `,
        preConfirm: () => {
            return {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                role: document.getElementById("role").value,
                image: document.getElementById("image").files[0]
            };
        }
    });

    if (!form) return;

    let fd = new FormData();
    fd.append("name", form.name);
    fd.append("email", form.email);
    fd.append("role", form.role);

    if (form.password) fd.append("password", form.password);
    if (form.image) fd.append("image", form.image);

    await fetch(`${API}/users/${id}`, {
        method: "POST", // or PUT if backend supports multipart PUT
        headers: {
            "Authorization": `Bearer ${token}`
        },
        body: fd
    });

    loadUsers();
};

/* ================= BOOKS ================= */
async function loadBooks() {
    const res = await fetch(`${API}/books`, {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    let html = `
    <tr>
        <th>ID</th>
        <th>Cover</th>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Qty</th>
        <th>Action</th>
    </tr>`;

    data.forEach(b => {
        const imageUrl = b.image
            ? `http://127.0.0.1:8000/storage/${b.image}`
            : "https://dummyimage.com/60x80/cccccc/000000&text=No+Image";

        html += `
        <tr>
            <td>${b.id}</td>
            <td><img src="${imageUrl}" width="50"></td>
            <td>${b.title}</td>
            <td>${b.author}</td>
            <td>${b.isbn}</td>
            <td>${b.quantity}</td>
            <td>
                <button onclick="editBook(${b.id})">Edit</button>
                <button onclick="deleteItem('books',${b.id})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("booksTable").innerHTML = html;
}
/* ADD BOOK */
async function addBook() {
    const { value: form } = await Swal.fire({
        title: "Add Book",
        html: `
            <input id="title" class="swal2-input" placeholder="Title">
            <input id="author" class="swal2-input" placeholder="Author">
            <input id="isbn" class="swal2-input" placeholder="ISBN">
            <input id="quantity" type="number" class="swal2-input" placeholder="Quantity">
            <input id="image" type="file" class="swal2-file">
        `,
        focusConfirm: false,
        showCancelButton: true,
        preConfirm: () => {
            const popup = Swal.getPopup();

            return {
                title: popup.querySelector("#title").value,
                author: popup.querySelector("#author").value,
                isbn: popup.querySelector("#isbn").value,
                quantity: popup.querySelector("#quantity").value,
                image: popup.querySelector("#image").files[0] || null
            };
        }
    });

    if (!form) return;

    const fd = new FormData();
    fd.append("title", form.title);
    fd.append("author", form.author);
    fd.append("isbn", form.isbn);
    fd.append("quantity", form.quantity);

    if (form.image) {
        fd.append("image", form.image);
    }

    try {
        const res = await fetch(`${API}/books`, {
            method: "POST",
            headers: {
                Authorization: `Bearer ${token}`
            },
            body: fd
        });

        const data = await res.json();

        if (!res.ok) throw data;

        Swal.fire("Success", "Book added successfully!", "success");
        loadBooks();

    } catch (err) {
        Swal.fire("Error", err.message || "Failed to add book", "error");
    }
}
window.editBook = async function (id) {
    const res = await fetch(`${API}/books/${id}`, {
        headers: {
            Authorization: `Bearer ${token}`
        }
    });

    if (!res.ok) {
        Swal.fire("Error", "Failed to fetch book", "error");
        return;
    }

    const b = await res.json();

    const { value: form } = await Swal.fire({
        title: "Edit Book",
        html: `
            <input id="title" class="swal2-input" value="${b.title ?? ""}">
            <input id="author" class="swal2-input" value="${b.author ?? ""}">
            <input id="isbn" class="swal2-input" value="${b.isbn ?? ""}">
            <input id="quantity" type="number" class="swal2-input" value="${b.quantity ?? 1}">
            <input id="image" type="file" class="swal2-file">
        `,
        focusConfirm: false,
        showCancelButton: true,
        preConfirm: () => {
            const popup = Swal.getPopup();

            return {
                title: popup.querySelector("#title").value,
                author: popup.querySelector("#author").value,
                isbn: popup.querySelector("#isbn").value,
                quantity: popup.querySelector("#quantity").value,
                image: popup.querySelector("#image").files[0] || null
            };
        }
    });

    if (!form) return;

    const fd = new FormData();
    fd.append("_method", "PUT"); method: "POST"
    fd.append("title", form.title);
    fd.append("author", form.author);
    fd.append("isbn", form.isbn);
    fd.append("quantity", form.quantity);

    if (form.image) {
        fd.append("image", form.image);
    }

    try {
        const updateRes = await fetch(`${API}/books/${id}`, {
            method: "POST",
            headers: {
                Authorization: `Bearer ${token}`
            },
            body: fd
        });

        const data = await updateRes.json();

        if (!updateRes.ok) throw data;

        Swal.fire("Updated", "Book updated successfully!", "success");
        loadBooks();

    } catch (err) {
        Swal.fire("Error", err.message || "Update failed", "error");
    }
};

/* ================= TRANSACTIONS ================= */
async function loadTransactions() {
    const res = await fetch(`${API}/transactions`, {
        headers: { "Authorization": `Bearer ${token}` }
    });

    const data = await res.json();

    let html = `
    <tr>
        <th>ID</th><th>User</th><th>Book</th><th>Status</th><th>Action</th>
    </tr>`;

    data.forEach(t => {
        html += `
        <tr>
            <td>${t.id}</td>
            <td>${t.user_id}</td>
            <td>${t.book_id}</td>
            <td>${t.status ?? 'pending'}</td>
            <td>
                <button class="action-btn delete" onclick="deleteItem('transactions',${t.id})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("transTable").innerHTML = html;
}

/* ADD TRANSACTION */
async function addTransaction() {
    const { value: form } = await Swal.fire({
        title: "Borrow Book",
        html: `
        <input id="user_id" class="swal2-input">
        <input id="book_id" class="swal2-input">
        `,
        preConfirm: () => ({
            user_id: document.getElementById("user_id").value,
            book_id: document.getElementById("book_id").value
        })
    });

    await fetch(`${API}/borrow`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(form)
    });

    loadTransactions();
}

/* ================= DELETE ================= */
async function deleteItem(type, id) {
    await fetch(`${API}/${type}/${id}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${token}` }
    });

    if (type === "users") loadUsers();
    if (type === "books") loadBooks();
    if (type === "transactions") loadTransactions();
}

/* ================= LOGOUT ================= */
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

/* INIT */
loadUsers();
loadBooks();
loadTransactions();

</script>

</body>
</html>
