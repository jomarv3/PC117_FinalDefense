<!DOCTYPE html>
<html>
<head>
<title>Borrower Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    display: flex;
    height: 100vh;
    background: #f5f7fb;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #111827;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
}

.nav a {
    display: block;
    padding: 12px;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 10px;
    cursor: pointer;
}

.nav a:hover {
    background: #374151;
}

.nav a.active {
    background: #2563eb;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}

/* SECTIONS */
.section {
    display: none;
}

.section.active {
    display: block;
}

/* CARD */
.card {
    background: #f2f2f2;
    padding: 20px;
    margin: 10px;
    width: 200px;
    border-radius: 10px;
    display: inline-block;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* BUTTON */
button {
    background: red;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div>
        <h2>Borrower</h2>

        <div class="nav">
            <a class="menu active" data-page="dashboard">Dashboard</a>
            <a class="menu" data-page="books">Books</a>
            <a class="menu" data-page="mybooks">My Borrowed Books</a>
        </div>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">
        <h2>Borrower Dashboard</h2>

        <div class="card">Available Books</div>
        <div class="card">Borrowed Books</div>
        <div class="card">Returned Books</div>
    </div>

    <!-- BOOKS -->
    <div id="books" class="section">
        <h2>Available Books</h2>

        <div class="card">Book 1</div>
        <div class="card">Book 2</div>
        <div class="card">Book 3</div>
    </div>

    <!-- MY BOOKS -->
    <div id="mybooks" class="section">
        <h2>My Borrowed Books</h2>

        <div class="card">My Book 1</div>
        <div class="card">My Book 2</div>
    </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

// ROLE CHECK
if (!user || user.role !== "borrower") {
    window.location.href = "index.html";
}

/* SIDEBAR NAVIGATION */
const menus = document.querySelectorAll(".menu");
const sections = document.querySelectorAll(".section");

menus.forEach(menu => {
    menu.addEventListener("click", () => {

        menus.forEach(m => m.classList.remove("active"));
        menu.classList.add("active");

        const page = menu.getAttribute("data-page");

        sections.forEach(s => s.classList.remove("active"));
        document.getElementById(page).classList.add("active");
    });
});

/* LOGOUT */
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
