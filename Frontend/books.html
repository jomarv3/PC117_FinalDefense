<!DOCTYPE html>
<html>
<head>
<title>Books CRUD</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }

table {
    width: 100%;
    background: white;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.add-btn { background: green; color: white; }
.edit-btn { background: orange; color: white; }
.del-btn { background: red; color: white; }
</style>
</head>

<body>

<h2>Books Management</h2>

<button class="add-btn" onclick="addBook()">+ Add Book</button>

<table>
    <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="bookTable"></tbody>
</table>

<script>
const token = localStorage.getItem("token");

async function loadBooks() {
    const res = await fetch("http://127.0.0.1:8000/api/books", {
        headers: { "Authorization": "Bearer " + token }
    });

    const books = await res.json();

    let html = "";
    books.forEach(b => {
        html += `
            <tr>
                <td>${b.title}</td>
                <td>${b.author}</td>
                <td>
                    <button class="edit-btn" onclick="editBook(${b.id})">Edit</button>
                    <button class="del-btn" onclick="deleteBook(${b.id})">Delete</button>
                </td>
            </tr>
        `;
    });

    document.getElementById("bookTable").innerHTML = html;
}

async function addBook() {
    const title = prompt("Book Title:");
    const author = prompt("Author:");

    await fetch("http://127.0.0.1:8000/api/books", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ title, author })
    });

    loadBooks();
}

async function editBook(id) {
    const title = prompt("New Title:");
    const author = prompt("New Author:");

    await fetch(`http://127.0.0.1:8000/api/books/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ title, author })
    });

    loadBooks();
}

async function deleteBook(id) {
    await fetch(`http://127.0.0.1:8000/api/books/${id}`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
    });

    loadBooks();
}

loadBooks();
</script>

</body>
</html>
